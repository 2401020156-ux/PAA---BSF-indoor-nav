<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulasi Navigasi Indoor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header class="header">
    <div class="header-card card">
      <h1 class="header-title">Simulasi Navigasi Indoor</h1>
    </div>
  </header>

  <!-- ── Main (flex:1 fills remaining viewport) ── -->
  <main class="main">

    <!-- Map + Legend -->
    <div class="content-grid">

      <!-- Map -->
      <section class="map-section">
        <div class="map-wrapper card">
          <canvas id="mapCanvas"></canvas>
        </div>
      </section>

      <!-- Legend -->
      <aside class="legend-panel card">
        <h2 class="legend-title">LEGENDA PETA</h2>
        <ul class="legend-list">
          <li class="legend-item">
            <span class="legend-swatch" style="background:#F5B700;"></span>
            <span class="legend-label">Source</span>
          </li>
          <li class="legend-item">
            <span class="legend-swatch" style="background:#DC2626;"></span>
            <span class="legend-label">Destination</span>
          </li>
          <li class="legend-item">
            <span class="legend-swatch" style="background:#374151;"></span>
            <span class="legend-label">Dinding</span>
          </li>
          <li class="legend-item">
            <span class="legend-swatch corridor-swatch"></span>
            <span class="legend-label">Koridor</span>
          </li>
          <li class="legend-item">
            <span class="legend-swatch" style="background:#16A34A;"></span>
            <span class="legend-label">Jalur Terpendek</span>
          </li>
          <li class="legend-item">
            <span class="legend-swatch" style="background:#2563EB;"></span>
            <span class="legend-label">User</span>
          </li>
        </ul>
      </aside>

    </div><!-- /content-grid -->

    <!-- Control Panel -->
    <div class="control-panel card">

      <!-- Source / Destination info -->
      <div class="info-row">
        <div class="info-item">
          <div class="info-icon source-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#DC2626"/>
            </svg>
          </div>
          <div class="info-text">
            <span class="info-meta">Source</span>
            <strong class="info-room" id="sourceLabel">Ruang A1</strong>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon dest-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#F5B700"/>
            </svg>
          </div>
          <div class="info-text">
            <span class="info-meta">Destination</span>
            <strong class="info-room" id="destLabel">Ruang A3</strong>
          </div>
        </div>
      </div>

      <div class="ctrl-divider"></div>

      <!-- Buttons -->
      <div class="btn-row">
        <button class="btn btn-acak-map" id="btnAcakMap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
            <line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
          <span>Acak Map</span>
        </button>

        <button class="btn btn-acak-sd" id="btnAcakSD">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 3 21 3 21 8"/>
            <line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21 16 21 21 16 21"/>
            <line x1="15" y1="15" x2="21" y2="21"/>
          </svg>
          <span>Acak Source<br>dan Dest</span>
        </button>

        <button class="btn btn-start" id="btnStart">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          <span>Start</span>
        </button>

        <button class="btn btn-restart" id="btnRestart">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-4.35"/>
          </svg>
          <span>Restart map</span>
        </button>
      </div>

    </div><!-- /control-panel -->

  </main>

  <script src="script.js"></script>
</body>
</html>
